<template>
    <lightning-card title={salesOfficeName} icon-name="custom:custom85">
        
        <div class="slds-m-around_medium">
            <!-- Header Counters -->
            <div class="slds-grid slds-gutters">
                <div class="slds-col">
                    <strong>Properties Claimed:</strong> {propertiesClaimedCount}
                </div>
                <div class="slds-col">
                    <strong>My YTD Sales:</strong> {agentYTDSales}
                </div>
                <div class="slds-col">
                    <strong>My YTD Commissions:</strong> {agentYTDCommissions}
                </div>
            </div>

            <!-- Data Table with Lazy Loading -->
            <lightning-datatable
                key-field="Id"
                data={propertyDetails}
                columns={columns}
                selected-rows={selectedRowIds}
                onrowselection={handleRowSelection}
                enable-infinite-loading={enableInfiniteLoading}
                onloadmore={handleLoadMore}>
            </lightning-datatable>

            <!-- Action Buttons -->
            <div class="slds-m-top_large slds-m-bottom_large">
                <lightning-button variant="brand" label="Claim Properties" onclick={claimProperties}></lightning-button>
                <lightning-button variant="brand" label="Claim and Continue" onclick={claimAndContinue}></lightning-button>
                <lightning-button label="Cancel" onclick={cancel} class="slds-m-left_small"></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
